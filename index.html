          id: `trx-${Math.floor(Math.random() * 9000 + 1000)}`,
          type,
          itemCode,
          itemName: matchedItem.name,
          quantity: quantityNum,
          date: new Date().toISOString().split('T')[0],
          unitPrice: type === 'مشتريات' ? uPrice : undefined,
          totalPrice: type === 'مشتريات' ? totalPrice : undefined,
          invoiceNumber: type === 'مشتريات' ? invoiceNum : undefined,
          notes,
          supportingFiles: []
        };

        setTransactions(prev => [newTrx, ...prev]);

        // Inventory balancing arithmetic
        setItems(prev => prev.map(invItem => {
          if (invItem.code === itemCode) {
            let nextQty = invItem.quantity;
            if (type === 'صادر') nextQty -= quantityNum;
            else nextQty += quantityNum;
            return { ...invItem, quantity: Math.max(0, nextQty) };
          }
          return invItem;
        }));

        setShowForm(false);
        setQty(''); setUnitPrice(''); setInvoiceNum(''); setNotes('');
      };

                      }
